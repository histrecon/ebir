<style>
    /* Стили навигационного модуля - УМЕНЬШЕННАЯ ВЕРСИЯ */
    .navigation-module {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(30, 20, 10, 0.95);
        border-bottom: 2px solid #d4a574;
        z-index: 999;
        padding: 8px 15px; /* Уменьшил padding */
        box-shadow: 0 3px 15px rgba(0, 0, 0, 0.4);
        height: 55px; /* Фиксированная высота */
        display: flex;
        align-items: center;
    }
    
    .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 100%;
    }
    
    .nav-logo {
        display: flex;
        align-items: center;
        gap: 8px; /* Уменьшил gap */
        color: #e6a336;
        text-decoration: none;
        font-weight: bold;
        font-size: 1.1rem; /* Уменьшил шрифт */
        padding: 6px 12px; /* Уменьшил padding */
        border: 1px solid #d4a574;
        border-radius: 6px;
        background: rgba(139, 69, 19, 0.2);
        transition: all 0.3s;
        height: 36px; /* Фиксированная высота */
    }
    
    .nav-logo:hover {
        background: rgba(230, 163, 54, 0.2);
        transform: translateY(-1px);
    }
    
    .nav-menu {
        display: flex;
        gap: 10px; /* Уменьшил gap между кнопками */
        align-items: center;
        height: 100%;
    }
    
    .nav-menu-item {
        display: flex;
        align-items: center;
        gap: 6px; /* Уменьшил gap */
        color: #f5ebd8;
        text-decoration: none;
        padding: 6px 12px; /* Уменьшил padding */
        border-radius: 5px;
        transition: all 0.3s;
        font-weight: 600;
        font-size: 0.9rem; /* Уменьшил шрифт */
        border: 1px solid transparent;
        height: 36px; /* Фиксированная высота */
    }
    
    .nav-menu-item:hover {
        background: rgba(230, 163, 54, 0.2);
        color: #ffcc66;
        border-color: #d4a574;
        transform: translateY(-1px);
    }
    
    .nav-menu-item.active {
        background: linear-gradient(135deg, #e6a336, #d1891c);
        color: #333;
        border-color: #c17e1a;
    }
    
    @media (max-width: 768px) {
        .navigation-module {
            height: auto;
            padding: 5px 10px;
        }
        
        .nav-container {
            flex-direction: column;
            gap: 8px;
        }
        
        .nav-logo {
            height: 32px;
            font-size: 1rem;
            padding: 5px 10px;
        }
        
        .nav-menu {
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .nav-menu-item {
            padding: 4px 8px;
            font-size: 0.85rem;
            height: 32px;
        }
    }
</style>

<script>
    // JavaScript навигационного модуля
    (function() {
        'use strict';
        
        // Функция для подсветки активной страницы
        function highlightActivePage() {
            const navItems = document.querySelectorAll('.nav-menu-item');
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            
            navItems.forEach(item => {
                const href = item.getAttribute('href');
                if (href === currentPage) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }
        
        // Инициализация после загрузки DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', highlightActivePage);
        } else {
            highlightActivePage();
        }
        
        // Также обновляем при изменении URL
        window.addEventListener('popstate', highlightActivePage);
        
        // Обработка кликов по навигации для плавной активации
        document.addEventListener('click', function(e) {
            if (e.target.closest('.nav-menu-item')) {
                // Небольшая задержка для визуального эффекта
                setTimeout(highlightActivePage, 100);
            }
        });
        
    })();
</script>
